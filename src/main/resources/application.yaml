spring:
  application:
    name: watteenbuurt

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

simulation:
  random-seed: 42
  house-count: 30
  public-charger-count: 6
  pv-fraction: 0.40
  heat-pump-fraction: 0.30
  home-ev-fraction: 0.20
  tick-interval-ms: 200
  start-date-time: "2025-01-06T00:00:00"  # Monday in winter; ISO-8601 local date-time